<div class="login-container">
  <div class="glass-panel login-card">
    <div class="login-header">
      <div class="logo-container">
        <h2>RainClass</h2>
        <span class="badge">Educador</span>
      </div>
      <p>Plataforma de Realidad Aumentada</p>
    </div>

    <form (submit)="onLogin($event)" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          class="glass-input" 
          placeholder="Ingrese su usuario" 
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          class="glass-input" 
          placeholder="Ingrese su contraseña" 
          required>
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="glass-button login-btn">Ingresar al Sistema</button>
    </form>
  </div>
</div>
